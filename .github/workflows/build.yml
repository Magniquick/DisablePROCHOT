name: build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: sudo apt-get update && sudo apt-get install -y gnu-efi binutils

      - name: Build EFI binaries
        working-directory: ${{ github.workspace }}
        run: ./build.sh

      - name: Upload DisablePROCHOT artifact
        uses: actions/upload-artifact@v6
        with:
          name: DisablePROCHOT.efi
          path: ${{ github.workspace }}/DisablePROCHOT.efi
